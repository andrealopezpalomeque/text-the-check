<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 200" fill="none">
  <!--
    Recibito — "Overwhelmed" expression
    Same receipt body, tilted further. Big surprised eyes with dark pupils.
    Chaotic chat lines at slight angles. Floating !, ?, ? marks.
  -->

  <!-- Receipt body with more dramatic tilt -->
  <g transform="rotate(-6, 80, 100)">
    <path
      d="M 28,25 l 4,-3.5 4,3.5 4,-3.5 4,3.5 4,-3.5 4,3.5 4,-3.5 4,3.5 4,-3.5 4,3.5 4,-3.5 4,3.5 4,-3.5 4,3.5 4,-3.5 4,3.5 4,-3.5 4,3.5 4,-3.5 4,3.5 4,-3.5 4,3.5 4,-3.5 4,3.5 4,-3.5 4,3.5 C 142,37 124,78 139,115 C 144,148 124,170 132,175 l -4,3.5 -4,-3.5 -4,3.5 -4,-3.5 -4,3.5 -4,-3.5 -4,3.5 -4,-3.5 -4,3.5 -4,-3.5 -4,3.5 -4,-3.5 -4,3.5 -4,-3.5 -4,3.5 -4,-3.5 -4,3.5 -4,-3.5 -4,3.5 -4,-3.5 -4,3.5 -4,-3.5 -4,3.5 -4,-3.5 -4,3.5 -4,-3.5 C 19,159 37,127 23,88 C 18,52 37,32 28,25 Z"
      stroke="#4A90D9"
      stroke-width="2.5"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Big surprised eyes: large circle + small dark pupil offset upward -->
    <circle cx="64" cy="69" r="8" fill="#4A90D9"/>
    <circle cx="67" cy="66" r="3" fill="#0C1017"/>
    <circle cx="104" cy="66" r="8" fill="#4A90D9"/>
    <circle cx="107" cy="63" r="3" fill="#0C1017"/>

    <!-- Chaotic chat lines at slight random angles -->
    <rect x="44" y="103" width="40" height="7" rx="3.5" fill="#4A90D9" opacity="0.28" transform="rotate(-2, 64, 106)"/>
    <rect x="82" y="117" width="34" height="7" rx="3.5" fill="#4A90D9" opacity="0.20" transform="rotate(3, 99, 120)"/>
    <rect x="46" y="133" width="26" height="7" rx="3.5" fill="#4A90D9" opacity="0.28" transform="rotate(-1, 59, 136)"/>
    <rect x="76" y="147" width="38" height="7" rx="3.5" fill="#4A90D9" opacity="0.14" transform="rotate(2, 95, 150)"/>
  </g>

  <!-- Floating ! top-right -->
  <g opacity="0.50">
    <line x1="148" y1="23" x2="148" y2="41" stroke="#4A90D9" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="148" cy="48" r="2" fill="#4A90D9"/>
  </g>

  <!-- Floating ? top-left -->
  <g opacity="0.35">
    <path
      d="M 18,43 C 18,35 26,32 30,37 C 34,42 28,47 24,49 L 24,55"
      stroke="#4A90D9"
      stroke-width="2"
      fill="none"
      stroke-linecap="round"
    />
    <circle cx="24" cy="61" r="2" fill="#4A90D9"/>
  </g>

  <!-- Floating ? bottom-right -->
  <g opacity="0.22">
    <path
      d="M 145,145 C 145,138 152,135 155,140 C 158,145 153,149 150,151 L 150,156"
      stroke="#4A90D9"
      stroke-width="2"
      fill="none"
      stroke-linecap="round"
    />
    <circle cx="150" cy="161" r="1.5" fill="#4A90D9"/>
  </g>
</svg>
